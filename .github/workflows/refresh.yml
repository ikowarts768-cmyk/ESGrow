name: ESGrow Monthly Score Refresh

on:
  # Runs on the 1st of every month at 6 AM UTC
  schedule:
    - cron: '0 6 1 * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Wake up Render (free tier spins down)
        run: |
          echo "Waking up the server..."
          curl -s -o /dev/null -w "%{http_code}" https://esgrow-rpuy.onrender.com/api/summary || true
          sleep 60

      - name: Trigger full pipeline via API
        run: |
          echo "Triggering score refresh pipeline..."
          RESPONSE=$(curl -s -X POST "https://esgrow-rpuy.onrender.com/api/refresh?quick=false" \
            -H "Content-Type: application/json" \
            --max-time 300)
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -m json.tool || true
